<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            place-content: center;
        }
        #numberInput{
            width: 80%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button {
            width: 50%;
            padding: 10px;
            align-self: center;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border-radius: 4px;
        }
        button:hover {
            background-color: #45a049;
        }
        #results {
            margin-top: 20px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Number Analyzer</h1>
    <div class="container">
        <input type="number" id="numberInput" placeholder="Enter a number">
        <button onclick="analyzeNumber()">Analyze</button>
        <div id="results"></div>
    </div>
    <script>
        function isPalindrome(num) {
            let str = num.toString();
            let reversed = str.split('').reverse().join('');
            return str === reversed;
        }
        function isArmstrong(num) {
            let str = num.toString();
            let sum = 0;
            for (let i = 0; i < str.length; i++) {
                sum += Math.pow(parseInt(str[i]), str.length);
            }
            return sum === num;
        }
        function isPrime(num) {
            if (num <= 1) return false;
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) return false;
            }
            return true;
        }
        function factorial(num) {
            if (num < 0) return "Not defined for negative numbers";
            let fact = 1;
            for (let i = 1; i <= num; i++) {
                fact *= i;
            }
            return fact;
        }
        function analyzeNumber() {
            let num = parseInt(document.getElementById('numberInput').value);
        
            if (isNaN(num)) {
                document.getElementById('results').innerHTML = "<p>Please enter a valid number.</p>";
                return;
            }
            let palindromeResult = isPalindrome(num) ? "Yes" : "No";
            let armstrongResult = isArmstrong(num) ? "Yes" : "No";
            let primeResult = isPrime(num) ? "Yes" : "No";
            let factorialResult = factorial(num);
            document.getElementById('results').innerHTML = `
                <p>Palindrome: ${palindromeResult}</p>
                <p>Armstrong: ${armstrongResult}</p>
                <p>Prime: ${primeResult}</p>
                <p>Factorial: ${factorialResult}</p>
            `;
        }
    </script>
</body>
</html>
